services:
  db:
    container_name: user-task-db
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - app-network

  msa-user-mgmt:
    build:
      context: .
      dockerfile: msa-user-mgmt/Dockerfile
    container_name: msa-user-mgmt
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/user_db
      SERVICES_TASK_MGMT_BASE_URL: http://msa-task-mgmt:8082
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  msa-task-mgmt:
    build:
      context: .
      dockerfile: msa-task-mgmt/Dockerfile
    container_name: msa-task-mgmt
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/task_db
      SERVICES_USER_MGMT_BASE_URL: http://msa-user-mgmt:8081
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  msa-dashboard:
    build:
      context: .
      dockerfile: msa-dashboard/Dockerfile
    container_name: msa-dashboard
    ports:
      - "8083:8083"
    environment:
      SERVICES_USER_MGMT_BASE_URL: http://msa-user-mgmt:8081
      SERVICES_TASK_MGMT_BASE_URL: http://msa-task-mgmt:8082
    depends_on:
      - msa-user-mgmt
      - msa-task-mgmt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
